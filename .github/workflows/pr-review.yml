name: Grok PR Review Intake

on:
  pull_request_target:
    types:
      - opened
      - ready_for_review
      - synchronize

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  queue-for-grok:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Label PR for Grok review
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const labels = new Set(context.payload.pull_request.labels.map(label => label.name));
            labels.delete("grok-approved");
            labels.add("needs-grok-review");

            await github.rest.issues.setLabels({
              owner,
              repo,
              issue_number,
              labels: Array.from(labels),
            });
      - name: Ensure machine-readable review request comment
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = "<!-- grokclaw-pr-review-request -->";
            const body = [
              marker,
              "Queued for Grok review.",
              "",
              "This marker is managed automatically by `.github/workflows/pr-review.yml`.",
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(comment => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
